apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - https://github.com/argoproj/argo-cd/manifests/ha/cluster-install?ref=v3.3.8
  - projects
  - tc-github-platform.yaml
  - ./applications
  - namespace.yaml
  - vault-auth.yaml
  - vault-static-secret.yaml

patches:
  - path: patches/argocd-cm.yaml
  - path: patches/argocd-rbac-cm.yaml
  - path: patches/argocd-cmd-params-cm.yaml
  - path: patches/redis-ha-haproxy-affinity-patch.yaml
  - path: patches/argocd-server-teleport.yaml
