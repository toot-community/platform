apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: goldilocks
  namespace: argocd
spec:
  destination:
    namespace: goldilocks
    server: https://kubernetes.default.svc
  project: default
  source:
    path: manifests/applications/goldilocks
    repoURL: git@github.com:toot-community/platform.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
