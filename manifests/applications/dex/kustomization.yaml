apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dex

resources:
  - namespace.yaml
  - vault-auth.yaml
  - dex-secrets.yaml
  - static-client-secrets.yaml

helmCharts:
  - name: dex
    namespace: dex
    releaseName: dex
    repo: https://charts.dexidp.io
    valuesFile: helm-values.yaml
    version: 0.24.0
