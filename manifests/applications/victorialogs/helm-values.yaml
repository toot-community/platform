serviceAccount: 
  create: true
  
server:
  service:
    labels:
      teleport.dev/enabled: "true"
    annotations:
      teleport.dev/name: tc-victorialogs
      teleport.dev/port: "9428"
      teleport.dev/protocol: http
      teleport.dev/description: "VictoriaLogs log aggregation"
  retentionDiskSpaceUsage: "100"
  extraArgs:
    envflag.enable: true
    envflag.prefix: VM_
    loggerFormat: json
    httpListenAddr: :9428
    http.shutdownDelay: 15s
  
  persistentVolume:
    enabled: true
    size: 105Gi
    
  resources:
    requests:
      cpu: 45m
      memory: 1664Mi
    limits:
      memory: 1664Mi
      
  vmServiceScrape:
    enabled: true
    
vector:
  enabled: true
  resources:
    requests:
      cpu: 85m
      memory: 233Mi
    limits:
      memory: 1Gi
  
dashboards:
  enabled: true
  labels:
    grafana_dashboard: "1"