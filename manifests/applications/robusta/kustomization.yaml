apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: robusta

resources:
  - vault-auth.yaml
  - robusta-secrets-env.yaml

helmCharts:
  - name: robusta
    version: "0.36.0"
    releaseName: robusta
    namespace: robusta
    valuesFile: helm-values.yaml
    repo: https://robusta-charts.storage.googleapis.com
