apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-backup
  namespace: vault
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-raft-backup
  namespace: vault
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: vault-backup
          restartPolicy: OnFailure
          initContainers:
            - name: snapshot
              image: hashicorp/vault:2.0.0@sha256:e40c741ed95bb271425e3e6ca6c222d620cf8682f6f7a1b1e7c9d49d0aba484b
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  VAULT_TOKEN=$(vault write -field=token auth/kubernetes/login \
                    role=vault-backup \
                    jwt="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)")
                  export VAULT_TOKEN
                  FILENAME="vault-raft-$(date +%Y%m%d-%H%M%S).snap"
                  vault operator raft snapshot save "/snapshots/${FILENAME}"
                  echo "${FILENAME}" > /snapshots/FILENAME
                  vault kv get -field=AWS_ACCESS_KEY_ID secret/vault/backup/r2 > /snapshots/R2_KEY_ID
                  vault kv get -field=AWS_SECRET_ACCESS_KEY secret/vault/backup/r2 > /snapshots/R2_SECRET
              env:
                - name: VAULT_ADDR
                  value: "https://vault-active.vault.svc.cluster.local:8200"
                - name: VAULT_CACERT
                  value: "/vault/tls/ca.crt"
              volumeMounts:
                - name: snapshots
                  mountPath: /snapshots
                - name: vault-tls
                  mountPath: /vault/tls
                  readOnly: true
          containers:
            - name: upload
              image: amazon/aws-cli@sha256:3a1e663f3429e4b677b7f4187e84ea833bad16e9d028360259baf2cf50e88e2a
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  export AWS_ACCESS_KEY_ID=$(cat /snapshots/R2_KEY_ID)
                  export AWS_SECRET_ACCESS_KEY=$(cat /snapshots/R2_SECRET)
                  FILENAME=$(cat /snapshots/FILENAME)
                  aws s3 cp "/snapshots/${FILENAME}" \
                    "s3://toot-community-vault-raft-backups/${FILENAME}" \
                    --endpoint-url "https://0ae89288096e9795bb1a5d327d89aec5.r2.cloudflarestorage.com"
              volumeMounts:
                - name: snapshots
                  mountPath: /snapshots
          volumes:
            - name: snapshots
              emptyDir: {}
            - name: vault-tls
              secret:
                secretName: vault-server-tls
