apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: mastodon-secrets-env
  namespace: toot-community
spec:
  vaultAuthRef: default
  mount: secret
  type: kv-v2
  path: toot-community/mastodon-secrets-env
  refreshAfter: "1h"
  destination:
    name: mastodon-secrets-env
    create: true
    overwrite: true
