apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: default
  namespace: kube-system
spec:
  vaultConnectionRef: vault/default
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: talos-ccm
    serviceAccount: default
  vaultAuthGlobalRef:
    name: default
    namespace: vault
    allowDefault: true
